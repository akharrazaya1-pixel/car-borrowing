<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cars</title>
<link rel="stylesheet" href="cars.css">
</head>
<body>
<header>
<h1>Cars</h1>
<nav>
<a href="cars.html">Cars</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>
</header>
<div id="container">
<div class="box">
    <img src="car1.jpeg">
    <h4>City Car</h4>
    <p class="price" data-price="50">$50/day</p>
    <button onclick="openForm(this)">BORROW</button>
</div>
<div class="box">
    <img src="car2.jpeg">
    <h4>Sport Car</h4>
    <p class="price" data-price="120">$120/day</p>
    <button onclick="openForm(this)">BORROW</button>
</div>
<div class="box">
    <img src="car3.jpeg">
    <h4>Luxury Car</h4>
    <p class="price" data-price="200">$200/day</p>
    <button onclick="openForm(this)">BORROW</button>
</div>
<div class="box">
    <img src="car4.jpeg">
    <h4>SUV</h4>
    <p class="price" data-price="90">$90/day</p>
    <button onclick="openForm(this)">BORROW</button>
</div>
<div class="box">
    <img src="car5.jpeg">
    <h4>Electric</h4>
    <p class="price" data-price="110">$110/day</p>
    <button onclick="openForm(this)">BORROW</button>
</div>
<div class="box">
    <img src="car6.jpeg">
    <h4>Compact</h4>
    <p class="price" data-price="40">$40/day</p>
    <button onclick="openForm(this)">BORROW</button>
</div>
</div>
<div id="popup">
    <div class="form-box">
        <h3>Book Car</h3>
        <input type="text" id="name" placeholder="Your Name">
        <input type="email" id="email" placeholder="Email">
        <input type="number" id="days" placeholder="Days">
        <h4>Total: $<span id="total">0</span></h4>
        <input type="text" id="card" placeholder="Card Number">
        <button onclick="confirmBooking()">Confirm</button>
        <button onclick="closeForm()">Cancel</button>
    </div>
</div>
<div id="success">You borrowed the car ✅</div>
<script src="cars.js"></script>
</body>
</html>
