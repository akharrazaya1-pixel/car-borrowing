<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore Maroc</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
}

header {
    background: #0a3d62;
    color: white;
    text-align: center;
    padding: 20px;
}

.hero {
    height: 250px;
    background: url("https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?auto=format&fit=crop&w=1200&q=80") center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 2rem;
}

.controls {
    text-align: center;
    padding: 15px;
}

input, select {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
}

.places {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.card:hover {
    transform: scale(1.05);
}

.info-box {
    padding: 25px;
    background: #dff9fb;
    font-size: 1.1rem;
    line-height: 1.6;
}

footer {
    background: #0a3d62;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>
</head>

<body>
<header>
    <h1>🌍 Explore Maroc</h1>
    <p>Découvrez les plus beaux endroits du Maroc</p>
</header>

<section class="hero">
    <h2>Voyagez autrement</h2>
</section>

<section class="controls">
    <input type="text" id="search" placeholder="Rechercher un lieu...">
    <select id="filter">
        <option value="all">Tout</option>
        <option value="ville">Villes</option>
        <option value="nature">Nature</option>
        <option value="plage">Plages</option>
    </select>
</section>

<section class="places" id="places"></section>

<section class="info-box" id="infoBox">
    <p>Cliquez sur un lieu pour voir plus d'informations</p>
</section>

<footer>
    <p>© 2026 Explore Maroc</p>
</footer>

<script src="script.js"></script>

</body>
</html>

const container = document.getElementById("places");
const search = document.getElementById("search");
const filter = document.getElementById("filter");
const infoBox = document.getElementById("infoBox");

function displayPlaces(data) {
    container.innerHTML = "";

    data.forEach(place => {
        let card = document.createElement("div");
        card.classList.add("card");
        card.setAttribute("data-category", place.category);

        card.innerHTML = `
            <img src="${place.image}">
            <h3>${place.name}</h3>
        `;

        card.addEventListener("click", () => {
            infoBox.innerHTML = `
                <h2>${place.name}</h2>
                <p>${place.description}</p>
            `;
        });

        container.appendChild(card);
    });
}

displayPlaces(placesData);

function update() {
    let searchValue = search.value.toLowerCase();
    let filterValue = filter.value;

    let filtered = placesData.filter(place => {
        let matchSearch = place.name.toLowerCase().includes(searchValue);
        let matchFilter = filterValue === "all" || place.category === filterValue;
        return matchSearch && matchFilter;
    });

    displayPlaces(filtered);
}

search.addEventListener("input", update);
filter.addEventListener("change", update);
</script>
